<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تدريبات إنجليزي أولى ابتدائي</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .title {
      text-align: center;
      margin-bottom: 30px;
    }

    .title h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .title p {
      color: #cbd5e1;
      font-size: 18px;
    }

    .quiz-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      transition: 0.3s;
    }

    .quiz-box:hover {
      transform: translateY(-5px);
    }

    .question {
      font-size: 24px;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .answers {
      display: grid;
      gap: 15px;
    }

    button.answer-btn {
      border: none;
      padding: 15px;
      border-radius: 15px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
      background: white;
      color: black;
      font-weight: bold;
    }

    button.answer-btn:hover {
      transform: scale(1.03);
      background: #38bdf8;
      color: white;
    }

    .correct {
      background: #22c55e !important;
      color: white !important;
    }

    .wrong {
      background: #ef4444 !important;
      color: white !important;
    }

    .score-box {
      text-align: center;
      margin-top: 30px;
      font-size: 30px;
      font-weight: bold;
      display: none;
    }

    .restart-btn {
      margin-top: 20px;
      background: #facc15;
      color: black;
      border: none;
      padding: 15px 30px;
      border-radius: 15px;
      font-size: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .progress {
      text-align: center;
      margin-bottom: 20px;
      font-size: 20px;
      color: #e2e8f0;
    }

    @media(max-width:700px){
      .question{
        font-size:20px;
      }

      button.answer-btn{
        font-size:16px;
      }

      .title h1{
        font-size:28px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="title">
      <h1>English Exam Training</h1>
      <p>تدريبات تفاعلية على منهج أولى ابتدائي</p>
    </div>

    <div class="progress" id="progress"></div>

    <div class="quiz-box">
      <div class="question" id="question"></div>

      <div class="answers" id="answers"></div>
    </div>

    <div class="score-box" id="scoreBox">
      <div id="scoreText"></div>

      <button class="restart-btn" onclick="restartQuiz()">
        إعادة الامتحان
      </button>
    </div>

  </div>

  <script>

    const quizData = [
      {
        question: "What is this? 🍅",
        answers: ["Tiger", "Tomato", "Tree", "Teacher"],
        correct: "Tomato"
      },

      {
        question: "Choose the correct verb: He ___ my friend.",
        answers: ["am", "is", "are", "be"],
        correct: "is"
      },

      {
        question: "What is this? 🪑",
        answers: ["Bag", "Board", "Chair", "Desk"],
        correct: "Chair"
      },

      {
        question: "Choose the correct sentence",
        answers: [
          "Open your book",
          "Book your open",
          "Your open book",
          "Open book your"
        ],
        correct: "Open your book"
      },

      {
        question: "The sky is ____",
        answers: ["Red", "Green", "Blue", "Black"],
        correct: "Blue"
      },

      {
        question: "I can see a ____ 🐍",
        answers: ["Spider", "Snake", "Star", "Spoon"],
        correct: "Snake"
      },

      {
        question: "What shape is this? ⚪",
        answers: ["Triangle", "Square", "Circle", "Rectangle"],
        correct: "Circle"
      },

      {
        question: "Who is this? 👨",
        answers: ["Mother", "Sister", "Father", "Grandmother"],
        correct: "Father"
      },

      {
        question: "How many books are there? 📚📚📚📚📚",
        answers: ["Three", "Four", "Five", "Two"],
        correct: "Five"
      },

      {
        question: "I have two ____",
        answers: ["Nose", "Eyes", "Tongue", "Head"],
        correct: "Eyes"
      },

      {
        question: "I can hear with my ____",
        answers: ["Eyes", "Hands", "Ears", "Tongue"],
        correct: "Ears"
      },

      {
        question: "The cow is ____",
        answers: ["Small", "Big", "Blue", "Red"],
        correct: "Big"
      },

      {
        question: "What is this? 🐵",
        answers: ["Monkey", "Mouse", "Moon", "Mango"],
        correct: "Monkey"
      },

      {
        question: "Choose the correct answer: It is ___ orange.",
        answers: ["a", "an", "the", "are"],
        correct: "an"
      },

      {
        question: "Where is the cat?",
        answers: [
          "Under the chair",
          "Blue",
          "Five books",
          "A tiger"
        ],
        correct: "Under the chair"
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const answersEl = document.getElementById("answers");
    const progressEl = document.getElementById("progress");
    const scoreBox = document.getElementById("scoreBox");
    const scoreText = document.getElementById("scoreText");

    function loadQuestion(){

      const currentQuiz = quizData[currentQuestion];

      progressEl.innerText = `السؤال ${currentQuestion + 1} من ${quizData.length}`;

      questionEl.innerHTML = currentQuiz.question;

      answersEl.innerHTML = "";

      currentQuiz.answers.forEach(answer => {

        const button = document.createElement("button");

        button.innerText = answer;

        button.classList.add("answer-btn");

        button.addEventListener("click", () => checkAnswer(button, answer));

        answersEl.appendChild(button);
      });
    }

    function checkAnswer(button, answer){

      const correctAnswer = quizData[currentQuestion].correct;

      const allButtons = document.querySelectorAll(".answer-btn");

      allButtons.forEach(btn => {
        btn.disabled = true;

        if(btn.innerText === correctAnswer){
          btn.classList.add("correct");
        }
      });

      if(answer === correctAnswer){
        score++;
      } else {
        button.classList.add("wrong");
      }

      setTimeout(() => {
        currentQuestion++;

        if(currentQuestion < quizData.length){
          loadQuestion();
        } else {
          finishQuiz();
        }

      }, 1200);
    }

    function finishQuiz(){

      document.querySelector(".quiz-box").style.display = "none";
      progressEl.style.display = "none";

      scoreBox.style.display = "block";

      scoreText.innerHTML = `🎉 نتيجتك ${score} من ${quizData.length}`;
    }

    function restartQuiz(){
      currentQuestion = 0;
      score = 0;

      document.querySelector(".quiz-box").style.display = "block";
      progressEl.style.display = "block";

      scoreBox.style.display = "none";

      loadQuestion();
    }

    loadQuestion();

  </script>

</body>
</html>
